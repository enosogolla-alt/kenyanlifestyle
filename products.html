<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Kenyan Lifestyle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/products.css" />
  </head>
  <body>
    <nav class="site-nav" id="siteNav">
      <a href="index.html" class="nav-logo">
        <img
          src="images/logo.png"
          alt="Kenyan Lifestyle"
          class="nav-logo-img"
        />
        <span class="nav-logo-text">KENYAN LIFESTYLE</span>
      </a>

      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle menu"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="events.html">Events</a></li>
      </ul>

      <ul class="nav-right">
        <li><a href="request.html" class="nav-cta">Request Services</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <main class="products-main">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products..." />
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="jersey">Jerseys</button>
        <button class="filter-btn" data-filter="hoodie">Hoodies</button>
        <button class="filter-btn" data-filter="shorts">Shorts</button>
      </div>

      <div class="products-grid" id="productsGrid">
        <div class="product-card" data-category="jersey">
          <div class="product-img">
            <img src="images/p1.png" alt="Heritage Jersey" />
          </div>
          <div class="product-info">
            <p class="product-name">Heritage Jersey</p>
            <p class="product-price">KES 3,500</p>
          </div>
        </div>

        <div class="product-card" data-category="jersey">
          <div class="product-img">
            <img src="images/p2.png" alt="Cantona Jersey" />
          </div>
          <div class="product-info">
            <p class="product-name">Cantona Jersey</p>
            <p class="product-price">KES 3,500</p>
          </div>
        </div>

        <div class="product-card" data-category="hoodie">
          <div class="product-img">
            <img src="images/p3.png" alt="Culture Hoodie" />
          </div>
          <div class="product-info">
            <p class="product-name">Culture Hoodie</p>
            <p class="product-price">KES 4,200</p>
          </div>
        </div>

        <div class="product-card" data-category="shorts">
          <div class="product-img">
            <img src="images/p4.png" alt="Lifestyle Shorts" />
          </div>
          <div class="product-info">
            <p class="product-name">Lifestyle Shorts</p>
            <p class="product-price">KES 2,800</p>
          </div>
        </div>

        <div class="product-card" data-category="hoodie">
          <div class="product-img">
            <img src="images/hoodie.png" alt="Nairobi Hoodie" />
          </div>
          <div class="product-info">
            <p class="product-name">Nairobi Hoodie</p>
            <p class="product-price">KES 4,500</p>
          </div>
        </div>

        <div class="product-card" data-category="jersey">
          <div class="product-img">
            <img src="images/p6.png" alt="Likizo Jersey" />
          </div>
          <div class="product-info">
            <p class="product-name">Likizo Jersey</p>
            <p class="product-price">KES 3,800</p>
          </div>
        </div>
      </div>
    </main>
    <script src="js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
